version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: hexblade-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    privileged: true

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: hexblade-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
